<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Axiom — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem;
      text-align: center;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .logo {
      width: 72px; height: 72px;
      background: #06b6d4;
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.25rem; font-weight: 900; color: #0f172a;
      margin-bottom: 2rem;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: #94a3b8; font-size: 0.95rem; line-height: 1.6; max-width: 320px; margin-bottom: 2rem; }
    button {
      background: #06b6d4; color: #0f172a;
      border: none; border-radius: 10px;
      padding: 0.75rem 1.75rem;
      font-size: 0.9rem; font-weight: 700;
      cursor: pointer; min-height: 44px;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="logo">A</div>
  <h1>You're offline</h1>
  <p>Check your connection and try again. Your previously visited pages may still be available.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
