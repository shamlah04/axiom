name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fcip
          POSTGRES_PASSWORD: fcip_pass
          POSTGRES_DB: fcip_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # ── Always use Postgres in CI — matches production exactly ──────────
      # Never use SQLite in CI: migrations use Postgres-specific DDL and
      # aiosqlite does not support CREATE TYPE, JSONB, ALTER COLUMN, etc.
      DATABASE_URL: postgresql+asyncpg://fcip:fcip_pass@localhost:5432/fcip_db
      SECRET_KEY: ci-secret-key-that-is-long-enough-for-32-chars
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      # Disable external services in CI
      RESEND_API_KEY: disabled
      STRIPE_SECRET_KEY: disabled
      SCHEDULER_ENABLED: "false"
      ML_RETRAIN_ENABLED: "false"
      APP_BASE_URL: http://localhost:3000
      TESTING: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements_ml.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests/ -v --tb=short

  lint:
    name: Syntax check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements_ml.txt

      - name: Check syntax
        run: |
          python -m py_compile $(find app alembic -name "*.py")
          echo "All files passed syntax check"
