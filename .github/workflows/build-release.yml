name: Build & Release — Android + iOS

on:
  push:
    tags:
      - 'v*'          # Trigger on version tags: v1.0.0, v1.2.3, etc.
  workflow_dispatch:   # Allow manual trigger from GitHub UI
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'both'
        type: choice
        options: [both, android, ios]

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1: Build Next.js static export (shared by both platforms)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-web:
    name: Build Next.js Static Export
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build static export
        working-directory: web
        env:
          NEXT_EXPORT: 'true'
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build:mobile

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-out
          path: web/out/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: Android Build → APK (direct install) + AAB (Play Store)
  # ─────────────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: build-web
    if: ${{ github.event.inputs.platform != 'ios' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node dependencies
        working-directory: web
        run: npm ci

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-out
          path: web/out/

      - name: Capacitor sync
        working-directory: web
        run: npx cap sync android

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > web/android/keystore.jks

      - name: Build signed APK (direct install)
        working-directory: web/android
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Build signed AAB (Play Store)
        working-directory: web/android
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: axiom-android-apk
          path: web/android/app/build/outputs/apk/release/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: axiom-android-aab
          path: web/android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload to Play Store (internal track)
        if: startsWith(github.ref, 'refs/tags/')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.axiom.fleet
          releaseFiles: web/android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          whatsNewDirectory: fastlane/metadata/android/en-US/changelogs/

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3: iOS Build → IPA + TestFlight / App Store
  # ─────────────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: macos-14        # Must use macOS runner for Xcode
    needs: build-web
    if: ${{ github.event.inputs.platform != 'android' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Node dependencies
        working-directory: web
        run: npm ci

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-out
          path: web/out/

      - name: Capacitor sync
        working-directory: web
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: web/ios/App
        run: pod install

      - name: Install Apple certificate and provisioning profile
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create temp keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > \
            ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Build IPA
        working-directory: web/ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="Axiom Distribution"

          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist ../../ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: axiom-ios-ipa
          path: ${{ runner.temp }}/ipa/App.ipa

      - name: Upload to TestFlight
        if: startsWith(github.ref, 'refs/tags/')
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > /tmp/AuthKey.p8
          xcrun altool --upload-app \
            --type ios \
            --file $RUNNER_TEMP/ipa/App.ipa \
            --apiKey $APP_STORE_CONNECT_API_KEY_ID \
            --apiIssuer $APP_STORE_CONNECT_ISSUER_ID

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4: Create GitHub Release with download links
  # ─────────────────────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: axiom-android-apk
          path: ./release/

      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: axiom-ios-ipa
          path: ./release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/app-release.apk
            release/App.ipa
          body: |
            ## Axiom ${{ github.ref_name }}

            ### Downloads
            - **Android APK** — `app-release.apk` (direct install, enable "Unknown sources")
            - **iOS IPA** — `App.ipa` (install via TestFlight or AltStore)

            ### Install instructions
            See [LAUNCH-CHECKLIST.md](mobile/LAUNCH-CHECKLIST.md) for full instructions.
          draft: false
          prerelease: false
